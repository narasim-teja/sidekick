[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
# Allow reading .env-driven paths and the repo root for shared artifacts.
fs_permissions = [{ access = "read", path = "./" }]

remappings = [
  "forge-std/=lib/forge-std/src/",
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "@storknetwork/stork-evm-sdk/=lib/stork-evm-sdk/",
]

[rpc_endpoints]
arc_testnet = "${ARC_RPC_URL}"

[etherscan]
# Arcscan verification endpoint (filled in when verifying contracts; Phase 2).
arc_testnet = { key = "${ARCSCAN_API_KEY}", url = "https://testnet.arcscan.app/api" }

# See https://book.getfoundry.sh/reference/config/ for all options.
