# CRE workflow secrets — the Data Streams credentials the workflow reads via runtime.getSecret().
# Values are pulled from the environment (the CRE CLI reads --env / .env). NEVER hard-code the secret
# here; reference the env var names so the actual values stay in .env (gitignored).
secretsNames:
  CHAINLINK_API_KEY:
    - CHAINLINK_API_KEY
  CHAINLINK_API_SECRET:
    - CHAINLINK_API_SECRET
